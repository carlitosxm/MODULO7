<div class="container my-5">
    <div class="card shadow-lg border-0">
        
        <div class="card-header bg-primary text-white py-3">
            <div class="row align-items-center">
                <div class="col-sm-6">
                    <h2 class="mb-0 fw-bold">FACTURA</h2>
                </div>
                <div class="col-sm-6 text-sm-end">
                    <span class="badge bg-light text-primary fs-6">Folio: #{{invoice.id}}</span>
                </div>
            </div>
        </div>

        <div class="card-body p-4">
            
            <div class="row mb-5 mt-2">
                <div class="col-md-6 border-end">
                    <h5 class="text-muted text-uppercase small fw-bold mb-3">De:</h5>
                    <div class="p-2 bg-light rounded">
                        <company-view [company]="invoice.company"></company-view>
                    </div>
                </div>
                <div class="col-md-6 ps-md-4">
                    <h5 class="text-muted text-uppercase small fw-bold mb-3">Para:</h5>
                    <div class="p-2">
                        <customer-view [customer]="invoice.customer"></customer-view>
                    </div>
                </div>
            </div>

            <div class="card border-0 bg-white">
                <div class="card-header bg-transparent border-bottom-0 ps-0">
                    <h5 class="fw-bold"><i class="bi bi-list-check me-2"></i>Detalle de Productos</h5>
                </div>
                <div class="card-body px-0">
                    <invoice-detail [items]="invoice.items"></invoice-detail>
                </div>
            </div>

            <div class="row mt-4 pt-3 border-top">
                <div class="col-12 text-end">
                    <p class="text-muted small italic">Gracias por su preferencia.</p>
                </div>
            </div>
        </div>
    </div>
</div>
